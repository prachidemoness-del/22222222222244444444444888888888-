<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Divya 💖</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff4f8b,#ff1f6a);
overflow-x:hidden;
animation:heartbeat 2s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1)}
50%{transform:scale(1.02)}
100%{transform:scale(1)}
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

h1{
font-size:60px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white}
to{text-shadow:0 0 25px pink}
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff1f6a;
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

#cake{
font-size:100px;
cursor:pointer;
}

.confetti{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
from{transform:translateY(-100px)}
to{transform:translateY(100vh)}
}

.firework{
position:absolute;
font-size:30px;
animation:explode 1.5s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0)}
50%{transform:scale(2)}
100%{transform:scale(0)}
}

#message{
margin-top:20px;
font-size:28px;
width:70%;
margin:auto;
text-shadow:0 0 10px white;
  font-family:"Monotype Corsiva","Brush Script MT",cursive;
}

#gift{
font-size:100px;
cursor:pointer;
margin-top:20px;
}

#surpriseBox{
display:none;
margin-top:20px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.2);
}

.bigEmoji{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.kiss{
font-size:70px;
animation:kissMove 3s infinite;
}

@keyframes kissMove{
0%{transform:translateX(-50px);opacity:0}
50%{opacity:1}
100%{transform:translateX(50px);opacity:0}
}

.slideshow{
display:none;
margin-top:30px;
width:260px;
height:260px;
margin-left:auto;
margin-right:auto;
border-radius:20px;
overflow:hidden;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.slideshow img.active{
display:block;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<div id="startScreen">
<h1>🎂 Happy Birthday Divya 💖</h1>
<p>Tap to enter your surprise ✨</p>
<button onclick="start()">Enter</button>
</div>

<h2>Click the Cake 🎂</h2>

<div id="cake" onclick="celebrate()">🎂</div>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message"></div>

<div id="surpriseBox">

<div class="bigEmoji">😽💋</div>
<div class="kiss">💋</div>
<div class="bigEmoji">🥰💖</div>

<p style="font-size:22px;">For you… with all my love 💞</p>

</div>

<div class="slideshow">
<img src="photo1.jpg" class="active">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
</div>

<!-- 💖 ROMANTIC MUSIC -->
<audio id="music">
<source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Scott_Holmes_Music/Corporate__Motivational_Music/Scott_Holmes_Music_-_Our_Big_Moment.mp3" type="audio/mpeg">
</audio>

<script>

function start(){
document.getElementById("startScreen").style.display="none";

let music = document.getElementById("music");
music.volume = 0.5;
music.play();

createBalloons();
}

function createBalloons(){
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(b);
}
}

function celebrate(){

document.getElementById("cake").innerHTML="🍰";

for(let i=0;i<30;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerHTML="🎉";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
}

for(let i=0;i<8;i++){
let f=document.createElement("div");
f.className="firework";
f.innerHTML="✨";
f.style.left=Math.random()*100+"%";
f.style.top=Math.random()*60+"%";
document.body.appendChild(f);
}

typeMessage();
}

function typeMessage(){

let text="⚠️ Warning !! Today you're at high risk of being ambushed by kisses, hugs and way too much love. Happy Birthday Divya 🎂💖🎉";

let i=0;

let typing=setInterval(function(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
}else{
clearInterval(typing);
}
},40);

}

function openGift(){

document.getElementById("gift").innerHTML="🎁💝";

document.getElementById("surpriseBox").style.display="block";

document.querySelector(".slideshow").style.display="block";

startSlideshow();

}

function startSlideshow(){
let slides=document.querySelectorAll(".slideshow img");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);
}

</script>

</body>
</html>
